<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<meta name="theme-color" content="#0e0e10"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="BP Watchlist"/>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icon-192.png"/>
<link rel="icon" href="icon-192.png"/>
<title>BP Watchlist</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0e0e10;--surface:#18181b;--surface2:#1f1f23;--surface3:#27272c;
  --border:rgba(255,255,255,.07);--border-med:rgba(255,255,255,.13);--border-hi:rgba(255,255,255,.22);
  --text:#f4f4f5;--text2:#a1a1aa;--text3:#52525b;
  --accent:#a78bfa;--accent-dim:rgba(167,139,250,.15);--accent-border:rgba(167,139,250,.35);
  --green:#34d399;--green-dim:rgba(52,211,153,.12);
  --yellow:#fbbf24;--yellow-dim:rgba(251,191,36,.12);
  --red:#f87171;--red-dim:rgba(248,113,113,.12);
  --blue:#60a5fa;--blue-dim:rgba(96,165,250,.12);
  --radius:10px;--radius-lg:14px;--radius-xl:18px;
  --shadow:0 4px 24px rgba(0,0,0,.45);
}
:root.light{
  --bg:#f4f4f5;--surface:#ffffff;--surface2:#f0f0f2;--surface3:#e4e4e7;
  --border:rgba(0,0,0,.08);--border-med:rgba(0,0,0,.14);--border-hi:rgba(0,0,0,.22);
  --text:#18181b;--text2:#52525b;--text3:#a1a1aa;
  --accent:#7c3aed;--accent-dim:rgba(124,58,237,.1);--accent-border:rgba(124,58,237,.3);
  --green:#059669;--green-dim:rgba(5,150,105,.1);
  --yellow:#d97706;--yellow-dim:rgba(217,119,6,.1);
  --red:#dc2626;--red-dim:rgba(220,38,38,.1);
  --blue:#2563eb;--blue-dim:rgba(37,99,235,.1);
  --shadow:0 4px 24px rgba(0,0,0,.12);
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:5rem;transition:background .2s,color .2s}

/* LOGIN */
#login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:2rem;text-align:center;background:radial-gradient(ellipse at 50% 0%,rgba(167,139,250,.12) 0%,transparent 70%)}
.bp-logo{width:88px;height:88px;border-radius:24px;background:linear-gradient(135deg,#a78bfa,#7c3aed);display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:900;color:#fff;letter-spacing:-.04em;margin-bottom:1.5rem;box-shadow:0 8px 32px rgba(167,139,250,.35)}
#login-screen h1{font-size:26px;font-weight:700;letter-spacing:-.03em;margin-bottom:.4rem}
#login-screen .subtitle{color:var(--text2);font-size:14px;margin-bottom:2rem}
.login-box{background:var(--surface);border:1px solid var(--border-med);border-radius:var(--radius-xl);padding:2rem;width:100%;max-width:360px;box-shadow:var(--shadow)}
.login-field{margin-bottom:14px;text-align:left}
.login-field label{font-size:11px;color:var(--text2);display:block;margin-bottom:6px;text-transform:uppercase;letter-spacing:.06em;font-weight:600}
.login-field input{width:100%;padding:10px 13px;font-size:14px;border:1px solid var(--border-med);border-radius:var(--radius);background:var(--surface2);color:var(--text);outline:none;font-family:inherit;transition:all .15s}
.login-field input:focus{border-color:var(--accent-border);box-shadow:0 0 0 3px var(--accent-dim)}
.login-btn{width:100%;padding:11px;border-radius:var(--radius);font-size:15px;font-weight:700;cursor:pointer;border:none;background:linear-gradient(135deg,#a78bfa,#7c3aed);color:#fff;margin-top:6px;transition:all .15s}
.login-btn:hover{opacity:.88;transform:translateY(-1px);box-shadow:0 4px 16px rgba(167,139,250,.4)}
.login-error{color:var(--red);font-size:13px;margin-top:10px;min-height:20px;text-align:center}
.login-footer{margin-top:1.25rem;font-size:12px;color:var(--text3)}

/* TOPBAR */
.topbar{background:rgba(14,14,16,.85);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:.75rem 2rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:60;gap:12px}
.topbar-brand{display:flex;align-items:center;gap:10px}
.topbar-logo{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,#a78bfa,#7c3aed);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;color:#fff;flex-shrink:0}
.topbar-brand h1{font-size:17px;font-weight:700;letter-spacing:-.03em}
.topbar-right{display:flex;gap:7px;align-items:center;flex-wrap:wrap}
#sync-status{font-size:12px;color:var(--text3);display:flex;align-items:center;gap:5px}
#sync-status.syncing{color:var(--yellow)}
#sync-status.synced{color:var(--green)}
#sync-status.error{color:var(--red)}

.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 13px;border-radius:var(--radius);font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--border-med);background:var(--surface2);color:var(--text2);transition:all .15s;white-space:nowrap}
.btn:hover{background:var(--surface3);color:var(--text);border-color:var(--border-hi)}
.btn.primary{background:var(--accent);color:#0e0e10;border-color:var(--accent);font-weight:600}
.btn.primary:hover{opacity:.88}
.btn i{font-size:15px}

.main{max-width:1120px;margin:0 auto;padding:1.5rem 2rem}

.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1.75rem}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px 18px;position:relative;overflow:hidden}
.stat::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,var(--stat-color,transparent) 0%,transparent 60%);opacity:.06;pointer-events:none}
.stat-label{font-size:11px;color:var(--text2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.06em;font-weight:600}
.stat-val{font-size:28px;font-weight:700;color:var(--text);letter-spacing:-.02em}
.stat-sub{font-size:11px;color:var(--text3);margin-top:2px}
.stat-s{--stat-color:var(--accent)}.stat-m{--stat-color:var(--green)}.stat-f{--stat-color:var(--yellow)}.stat-e{--stat-color:var(--blue)}

.cat-bar{display:flex;gap:6px;margin-bottom:1rem;flex-wrap:wrap;align-items:center}
.cat-chip{display:inline-flex;align-items:center;gap:5px;padding:5px 13px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--border-med);background:transparent;color:var(--text2);transition:all .15s}
.cat-chip:hover{background:var(--surface2);color:var(--text);border-color:var(--border-hi)}
.cat-chip.active{background:var(--accent);color:#0e0e10;border-color:var(--accent)}
.cat-chip .cat-del{margin-left:2px;opacity:.6;cursor:pointer;font-size:13px;display:flex;align-items:center}
.cat-add-btn{display:inline-flex;align-items:center;gap:4px;padding:5px 11px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:1px dashed var(--border-med);background:transparent;color:var(--text3);transition:all .15s}
.cat-add-btn:hover{color:var(--text2);border-color:var(--border-hi)}

.toolbar{display:flex;gap:8px;margin-bottom:1.25rem;flex-wrap:wrap;align-items:center}
.filter-btn{padding:6px 13px;border-radius:var(--radius);font-size:13px;border:1px solid var(--border-med);background:var(--surface2);color:var(--text2);cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:5px;font-weight:500}
.filter-btn:hover{background:var(--surface3);color:var(--text);border-color:var(--border-hi)}
.filter-btn.active{background:var(--surface3);color:var(--text);border-color:var(--border-hi)}
.divider{width:1px;height:24px;background:var(--border);margin:0 2px}
.sort-select,.view-select{padding:6px 10px;border-radius:var(--radius);font-size:13px;border:1px solid var(--border-med);background:var(--surface2);color:var(--text2);cursor:pointer;outline:none;font-family:inherit;transition:all .15s}
.search-wrap{margin-left:auto;position:relative}
.search-wrap i{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:15px;pointer-events:none}
.search-input{padding:7px 12px 7px 32px;border-radius:var(--radius);border:1px solid var(--border-med);background:var(--surface2);color:var(--text);font-size:13px;width:210px;outline:none;transition:all .15s}
.search-input:focus{border-color:var(--accent-border);box-shadow:0 0 0 3px var(--accent-dim)}

/* GRID & CARDS */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
.grid.list-view{grid-template-columns:1fr}

/* Card enter animation */
@keyframes cardIn{from{opacity:0;transform:translateY(12px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-xl);overflow:hidden;transition:border-color .15s,transform .15s,box-shadow .15s,opacity .2s;cursor:default;position:relative;animation:cardIn .25s ease both}
.card:hover{border-color:var(--border-med);transform:translateY(-2px);box-shadow:var(--shadow)}
.card.dragging{opacity:.5;transform:scale(.97)}
.card.drag-over{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-dim)}
@keyframes cardOut{from{opacity:1;transform:scale(1)}to{opacity:0;transform:scale(.95)}}
.card.removing{animation:cardOut .2s ease forwards}

/* POSTER grid mode */
.card-poster{width:100%;aspect-ratio:2/3;object-fit:cover;display:block;background:var(--surface2)}
.card-poster-placeholder{width:100%;aspect-ratio:2/3;background:var(--surface2);display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:40px}

/* LIST VIEW */
.grid.list-view .card{display:flex;flex-direction:row;align-items:stretch;border-radius:var(--radius-lg)}
.grid.list-view .card-poster{width:60px;min-width:60px;height:90px;aspect-ratio:unset;border-radius:var(--radius-lg) 0 0 var(--radius-lg);flex-shrink:0}
.grid.list-view .card-poster-placeholder{width:60px;min-width:60px;height:90px;aspect-ratio:unset;border-radius:var(--radius-lg) 0 0 var(--radius-lg);flex-shrink:0;font-size:22px}
.grid.list-view .drag-handle{top:50%;transform:translateY(-50%)}
.grid.list-view .card-body{flex:1;padding:.65rem .9rem;display:flex;flex-direction:column;justify-content:center;min-width:0}
.grid.list-view .card-title{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.grid.list-view .progress-bar{margin-bottom:3px}
.grid.list-view .progress-label{margin-bottom:0}

.card-body{padding:.9rem}
.drag-handle{position:absolute;top:8px;left:4px;color:rgba(255,255,255,.5);cursor:grab;padding:4px;opacity:0;transition:opacity .15s;font-size:16px;z-index:2;text-shadow:0 1px 3px rgba(0,0,0,.8)}
.card:hover .drag-handle{opacity:1}

.card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;gap:6px}
.card-top-left{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.badge{font-size:10px;font-weight:700;padding:3px 7px;border-radius:20px;letter-spacing:.04em;text-transform:uppercase}
.badge-series{background:var(--accent-dim);color:var(--accent);border:1px solid var(--accent-border)}
.badge-movie{background:var(--green-dim);color:var(--green);border:1px solid rgba(52,211,153,.3)}
.status-badge{font-size:10px;font-weight:600;padding:3px 7px;border-radius:20px}
.sb-watching{background:var(--blue-dim);color:var(--blue);border:1px solid rgba(96,165,250,.3)}
.sb-paused{background:var(--yellow-dim);color:var(--yellow);border:1px solid rgba(251,191,36,.3)}
.sb-towatch{background:rgba(255,255,255,.05);color:var(--text3);border:1px solid var(--border)}
.sb-done{background:var(--green-dim);color:var(--green);border:1px solid rgba(52,211,153,.3)}
.sb-dropped{background:var(--red-dim);color:var(--red);border:1px solid rgba(248,113,113,.3)}

.card-actions{display:flex;gap:2px;flex-shrink:0}
.icon-btn{background:transparent;border:none;cursor:pointer;color:var(--text3);padding:4px;border-radius:7px;display:flex;align-items:center;transition:color .15s,background .15s;font-size:14px}
.icon-btn:hover{color:var(--text);background:var(--surface3)}
.icon-btn.fav-on{color:var(--yellow)}
.card-title{font-size:14px;font-weight:700;color:var(--text);margin-bottom:4px;line-height:1.3;letter-spacing:-.01em}
.card-year{font-size:11px;color:var(--text3);margin-bottom:6px}
.card-cat{font-size:11px;color:var(--text3);margin-bottom:6px;display:flex;align-items:center;gap:3px}
.card-notes{font-size:11px;color:var(--text2);margin-bottom:8px;line-height:1.5;border-left:2px solid var(--border-hi);padding-left:7px;font-style:italic}

.progress-bar{height:3px;background:var(--surface3);border-radius:3px;margin-bottom:5px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--green));border-radius:3px;transition:width .4s cubic-bezier(.4,0,.2,1)}
.progress-label{font-size:11px;color:var(--text3);margin-bottom:8px;display:flex;justify-content:space-between}

.season-block{margin-bottom:4px;border:1px solid var(--border);border-radius:8px;overflow:hidden}
.season-header{display:flex;align-items:center;justify-content:space-between;padding:7px 9px;cursor:pointer;background:var(--surface2);gap:6px;transition:background .15s}
.season-header:hover{background:var(--surface3)}
.season-header-left{display:flex;align-items:center;gap:7px;font-size:12px;font-weight:600;flex:1}
.season-header-right{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text2);white-space:nowrap}
.season-check{width:15px;height:15px;border-radius:50%;border:1.5px solid var(--border-hi);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;cursor:pointer}
.season-check.done{background:var(--green);border-color:var(--green)}
.season-check.done::after{content:'';width:6px;height:6px;background:#0e0e10;border-radius:50%;display:block}
.season-eps{display:none;padding:8px;background:var(--surface)}
.season-eps.open{display:block}
.ep-grid{display:flex;flex-wrap:wrap;gap:3px}
.ep-pill{font-size:11px;padding:2px 7px;border-radius:20px;border:1px solid var(--border-med);cursor:pointer;color:var(--text2);background:transparent;transition:all .15s;font-weight:500;white-space:nowrap}
.ep-pill.done{background:var(--accent);color:#0e0e10;border-color:var(--accent);font-weight:600}
.ep-pill:hover:not(.done){background:var(--surface3);color:var(--text)}
.ep-actions{display:flex;gap:8px;margin-bottom:6px;align-items:center}
.ep-action-btn{font-size:11px;color:var(--text3);background:transparent;border:none;cursor:pointer;padding:0;transition:color .15s}
.ep-action-btn:hover{color:var(--accent)}
.chevron{transition:transform .2s;font-size:12px;color:var(--text3)}
.chevron.open{transform:rotate(180deg)}

.empty{grid-column:1/-1;text-align:center;padding:5rem 1rem;color:var(--text3);font-size:14px}
.empty i{font-size:44px;display:block;margin-bottom:12px}

/* MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;align-items:center;justify-content:center;padding:1rem}
.modal-bg.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border-med);border-radius:var(--radius-xl);padding:1.75rem;width:480px;max-width:96vw;max-height:92vh;overflow-y:auto;box-shadow:0 24px 80px rgba(0,0,0,.6)}
.modal h2{font-size:18px;font-weight:700;margin-bottom:1.25rem;letter-spacing:-.02em}
.field{margin-bottom:13px}
.field label{font-size:11px;color:var(--text2);display:block;margin-bottom:5px;text-transform:uppercase;letter-spacing:.06em;font-weight:600}
.field input,.field select,.field textarea{width:100%;padding:9px 12px;font-size:14px;border:1px solid var(--border-med);border-radius:var(--radius);background:var(--surface2);color:var(--text);outline:none;font-family:inherit;transition:border-color .15s}
.field textarea{resize:vertical;min-height:65px;line-height:1.5}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent-border);box-shadow:0 0 0 3px var(--accent-dim)}
.field select option{background:var(--surface2)}
.fields-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.season-row{display:grid;grid-template-columns:1fr 1fr auto;align-items:center;gap:8px;margin-bottom:8px}
.season-row-label{font-size:13px;color:var(--text2)}
.add-season-btn{font-size:13px;color:var(--text3);background:transparent;border:1px dashed var(--border-med);border-radius:var(--radius);padding:7px 12px;cursor:pointer;width:100%;margin-top:2px;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:6px}
.add-season-btn:hover{background:var(--surface3);color:var(--text2)}
.remove-season-btn{background:transparent;border:none;cursor:pointer;color:var(--text3);font-size:16px;display:flex;align-items:center;padding:4px;border-radius:6px;transition:all .15s}
.remove-season-btn:hover{color:var(--red);background:var(--red-dim)}
.modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:1.25rem;padding-top:1rem;border-top:1px solid var(--border)}

/* TMDB SEARCH */
.tmdb-search-wrap{position:relative;margin-bottom:13px}
.tmdb-search-wrap label{font-size:11px;color:var(--text2);display:block;margin-bottom:5px;text-transform:uppercase;letter-spacing:.06em;font-weight:600}
.tmdb-search-inner{display:flex;gap:8px}
.tmdb-search-inner input{flex:1;padding:9px 12px;font-size:14px;border:1px solid var(--border-med);border-radius:var(--radius);background:var(--surface2);color:var(--text);outline:none;font-family:inherit}
.tmdb-search-inner input:focus{border-color:var(--accent-border);box-shadow:0 0 0 3px var(--accent-dim)}
.tmdb-search-btn{padding:9px 14px;border-radius:var(--radius);border:1px solid var(--accent-border);background:var(--accent-dim);color:var(--accent);cursor:pointer;font-size:13px;font-weight:600;white-space:nowrap;transition:all .15s}
.tmdb-search-btn:hover{background:var(--accent);color:#0e0e10}
.tmdb-results{margin-top:8px;display:flex;flex-direction:column;gap:6px;max-height:260px;overflow-y:auto}
.tmdb-result{display:flex;gap:10px;padding:8px;border-radius:var(--radius);border:1px solid var(--border);cursor:pointer;transition:all .15s;align-items:center}
.tmdb-result:hover{background:var(--surface2);border-color:var(--border-med)}
.tmdb-result img{width:40px;height:60px;object-fit:cover;border-radius:5px;flex-shrink:0;background:var(--surface3)}
.tmdb-result-info{flex:1;min-width:0}
.tmdb-result-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tmdb-result-meta{font-size:11px;color:var(--text3)}
.tmdb-loading{text-align:center;padding:1rem;color:var(--text3);font-size:13px}
.tmdb-selected{display:flex;gap:10px;padding:10px;border-radius:var(--radius);border:1px solid var(--accent-border);background:var(--accent-dim);margin-bottom:13px;align-items:center}
.tmdb-selected img{width:44px;height:66px;object-fit:cover;border-radius:5px;flex-shrink:0}
.tmdb-selected-info{flex:1}
.tmdb-selected-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:2px}
.tmdb-selected-meta{font-size:11px;color:var(--text2)}
.tmdb-clear{background:transparent;border:none;cursor:pointer;color:var(--text3);padding:4px;border-radius:6px;font-size:16px;display:flex;align-items:center}
.tmdb-clear:hover{color:var(--red)}

/* History */
.history-panel{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-xl);padding:1.25rem;width:420px;max-width:96vw;max-height:80vh;overflow-y:auto;box-shadow:var(--shadow)}
.history-panel h3{font-size:16px;font-weight:700;margin-bottom:1rem;display:flex;justify-content:space-between;align-items:center}
.history-entry{padding:8px 0;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;gap:10px;font-size:13px}
.history-entry:last-child{border-bottom:none}
.history-entry .he-date{color:var(--text3);font-size:11px;white-space:nowrap}

.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(12px);background:var(--surface);border:1px solid var(--border-hi);color:var(--text);padding:10px 18px;border-radius:var(--radius);font-size:13px;font-weight:500;opacity:0;transition:all .25s;pointer-events:none;z-index:999;white-space:nowrap;box-shadow:var(--shadow);display:flex;align-items:center;gap:8px}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast-dot{width:7px;height:7px;border-radius:50%;background:var(--green);flex-shrink:0}

/* DETAIL MODAL */

};

const app = initializeApp(firebaseConfig);

let unsubscribe = null, saveTimeout = null;

window.loginEmail = async () => {
  const email = document.getElementById('login-email').value.trim();
  const pass = document.getElementById('login-pass').value;
  const errEl = document.getElementById('login-error');
  errEl.textContent = '';

};

window.logoutUser = async () => {
  if(!confirm('Sair da conta?')) return;
  if(unsubscribe) unsubscribe();
  await signOut(auth);
  items=[]; categories=['A ver agora','Em pausa','Para depois'];
  document.getElementById('login-screen').style.display='flex';

document.getElementById('login-pass').addEventListener('keydown',e=>{ if(e.key==='Enter') window.loginEmail(); });

onAuthStateChanged(auth, user => {
  if(user){
    document.getElementById('login-screen').style.display='none';

    startSync(user.uid);

function setSyncStatus(s){
  const el=document.getElementById('sync-status');
  const icons={syncing:'ti-cloud-upload',synced:'ti-cloud-check',error:'ti-cloud-off'};

  el.className=s; el.innerHTML=`<i class="ti ${icons[s]}"></i> ${labels[s]}`;
}

function startSync(uid){
  if(unsubscribe) unsubscribe();
  unsubscribe = onSnapshot(doc(db,'users',uid), snap => {
    if(snap.exists()){ const d=snap.data(); items=d.items||[]; categories=d.categories||['A ver agora','Em pausa','Para depois']; }
    setSyncStatus('synced'); renderCats(); render();
  }, ()=>setSyncStatus('error'));
}

window._save = () => {
  const uid=auth.currentUser?.uid; if(!uid) return;
  clearTimeout(saveTimeout); setSyncStatus('syncing');
  saveTimeout=setTimeout(async()=>{
    try{ await setDoc(doc(db,'users',uid),{items,categories,updatedAt:Date.now()}); setSyncStatus('synced'); }
    catch(e){ setSyncStatus('error'); }
  },800);
};
</script>

<script>
const TMDB_TOKEN = 'eyJhbGciOiJIUzI1NiJ9.eyJhdWQiOiIzMDg3NjFhMjYwOWI3YjYyYzkwMWM1NjI3ZTUwOThhNiIsIm5iZiI6MTc3OTI2MzE5Ni4yNzEwMDAxLCJzdWIiOiI2YTBkNjZkYzU4Nzg5ZmNkN2FlZGIzNTgiLCJzY29wZXMiOlsiYXBpX3JlYWQiXSwidmVyc2lvbiI6MX0.oa80B3hVfhtmTtoDEEFeQCwWlYYq7MAvnjzRmFwKPUY';
const TMDB_IMG = 'https://image.tmdb.org/t/p/w300';
const TMDB_IMG_FULL = 'https://image.tmdb.org/t/p/w500';

if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});

let items=[], categories=['A ver agora','Em pausa','Para depois'];
let typeFilter='all', catFilter=null, dragId=null, openPanels={};
let tmdbSelected=null;

// ── TMDB ──
async function tmdbSearch(){
  const q=document.getElementById('tmdb-query').value.trim(); if(!q) return;
  const type=document.getElementById('f-type').value;
  document.getElementById('tmdb-results').innerHTML='<div class="tmdb-loading">A pesquisar...</div>';
  try{
    const endpoint = type==='series'
      ? `https://api.themoviedb.org/3/search/tv?query=${encodeURIComponent(q)}&language=pt-PT`
      : `https://api.themoviedb.org/3/search/movie?query=${encodeURIComponent(q)}&language=pt-PT`;
    const res = await fetch(endpoint, {headers:{Authorization:`Bearer ${TMDB_TOKEN}`}});
    const data = await res.json();
    const results = (data.results||[]).slice(0,6);
    if(!results.length){ document.getElementById('tmdb-results').innerHTML='<div class="tmdb-loading">Sem resultados.</div>'; return; }
    document.getElementById('tmdb-results').innerHTML = results.map(r=>{
      const title = r.name||r.title||'';
      const year = (r.first_air_date||r.release_date||'').slice(0,4);
      const poster = r.poster_path?`${TMDB_IMG}${r.poster_path}`:'';
      return `<div class="tmdb-result" onclick="tmdbSelect(${r.id},'${type}')">
        ${poster?`<img src="${poster}" alt="" loading="lazy"/>`:`<div style="width:40px;height:60px;background:var(--surface3);border-radius:5px;flex-shrink:0"></div>`}
        <div class="tmdb-result-info">
          <div class="tmdb-result-title">${title}</div>
          <div class="tmdb-result-meta">${year}${r.vote_average?' · ⭐ '+r.vote_average.toFixed(1):''}</div>
        </div>
      </div>`;
    }).join('');
  }catch(e){ document.getElementById('tmdb-results').innerHTML='<div class="tmdb-loading">Erro ao pesquisar.</div>'; }
}

async function tmdbSelect(id, type){
  document.getElementById('tmdb-results').innerHTML='<div class="tmdb-loading">A carregar detalhes...</div>';
  try{
    const endpoint = type==='series'
      ? `https://api.themoviedb.org/3/tv/${id}?language=pt-PT`
      : `https://api.themoviedb.org/3/movie/${id}?language=pt-PT`;
    const res = await fetch(endpoint, {headers:{Authorization:`Bearer ${TMDB_TOKEN}`}});
    const data = await res.json();

    const title = data.name||data.title||'';
    const year = (data.first_air_date||data.release_date||'').slice(0,4);
    const poster = data.poster_path?`${TMDB_IMG_FULL}${data.poster_path}`:'';
    const overview = data.overview||'';

    // Fetch trailer
    let trailerId = '';
    try{
      const vRes = await fetch(`https://api.themoviedb.org/3/${type==='series'?'tv':'movie'}/${id}/videos?language=pt-PT`, {headers:{Authorization:`Bearer ${TMDB_TOKEN}`}});
      const vData = await vRes.json();
      const trailers = (vData.results||[]).filter(v=>v.site==='YouTube'&&(v.type==='Trailer'||v.type==='Teaser'));
      // prefer PT trailer, fallback to any
      const ptTrailer = trailers.find(v=>v.iso_639_1==='pt');
      const enTrailer = trailers[0];
      const chosen = ptTrailer||enTrailer;
      if(chosen) trailerId = chosen.key;
      // fallback to english videos
      if(!trailerId){
        const vRes2 = await fetch(`https://api.themoviedb.org/3/${type==='series'?'tv':'movie'}/${id}/videos`, {headers:{Authorization:`Bearer ${TMDB_TOKEN}`}});
        const vData2 = await vRes2.json();
        const t2 = (vData2.results||[]).find(v=>v.site==='YouTube'&&(v.type==='Trailer'||v.type==='Teaser'));
        if(t2) trailerId = t2.key;
      }
    }catch(e){}

    tmdbSelected = { id, type, title, year, poster, overview, tmdbId: id, trailerId };

    // Fill form
    document.getElementById('f-title').value = title;
    if(overview && !document.getElementById('f-notes').value) document.getElementById('f-notes').value = overview;

    // Fill seasons for TV
    if(type==='series' && data.seasons){
      document.getElementById('seasons-config').innerHTML='';
      const seasons = data.seasons.filter(s=>s.season_number>0);
      seasons.forEach(s=>addSeasonRow(s.episode_count));
    }

    // Show selected
    document.getElementById('tmdb-selected-box').style.display='block';
    document.getElementById('tmdb-selected-box').innerHTML=`
      <div class="tmdb-selected">
        ${poster?`<img src="${poster}" alt=""/>`:''}
        <div class="tmdb-selected-info">
          <div class="tmdb-selected-title">${title}</div>
          <div class="tmdb-selected-meta">${year}${data.number_of_seasons?' · '+data.number_of_seasons+' temporadas':''}</div>
        </div>
        <button class="tmdb-clear" onclick="tmdbClear()"><i class="ti ti-x"></i></button>
      </div>`;
    document.getElementById('tmdb-search-controls').style.display='none';
    toast('Dados preenchidos automaticamente!');
  }catch(e){ document.getElementById('tmdb-results').innerHTML='<div class="tmdb-loading">Erro ao carregar.</div>'; }
}

function tmdbClear(){
  tmdbSelected=null;
  document.getElementById('tmdb-selected-box').style.display='none';
  document.getElementById('tmdb-selected-box').innerHTML='';
  document.getElementById('tmdb-search-controls').style.display='block';
  document.getElementById('tmdb-results').innerHTML='';
  document.getElementById('tmdb-query').value='';
}

// ── Helpers ──
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2); }
function fmtDate(ts){ if(!ts) return ''; return new Date(ts).toLocaleDateString('pt-PT',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'}); }
function fmtDateShort(ts){ if(!ts) return ''; return new Date(ts).toLocaleDateString('pt-PT',{day:'2-digit',month:'short'}); }
function toast(msg){
  document.getElementById('toast-msg').textContent=msg;
  const el=document.getElementById('toast'); el.classList.add('show');
  clearTimeout(el._t); el._t=setTimeout(()=>el.classList.remove('show'),2400);
}
function save(){ if(window._save) window._save(); }

const STATUS_LABEL={towatch:'Para ver',watching:'A ver',paused:'Em pausa',done:'Concluído',dropped:'Abandonado'};
const STATUS_CLASS={towatch:'sb-towatch',watching:'sb-watching',paused:'sb-paused',done:'sb-done',dropped:'sb-dropped'};

function exportJSON(){
  if(!items.length){ toast('Não há nada para exportar!'); return; }
  const blob=new Blob([JSON.stringify({items,categories,exportedAt:new Date().toISOString()},null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob),a=document.createElement('a');
  a.href=url; a.download=`watchlist_${new Date().toISOString().slice(0,10)}.json`;
  a.click(); URL.revokeObjectURL(url); toast('Exportado!');
}
function importJSON(e){
  const file=e.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const data=JSON.parse(ev.target.result);
      const arr=Array.isArray(data)?data:(data.items||[]);
      const cats=data.categories||[];
      let added=0;
      arr.forEach(it=>{ if(!items.find(x=>x.id===it.id)){ items.push(it); added++; } });
      cats.forEach(c=>{ if(!categories.includes(c)) categories.push(c); });
      save(); renderCats(); render(); toast(`Importado! ${added} título(s) adicionado(s).`);
    }catch{ toast('Erro ao importar.'); }
  };

function saveItem(){
  const title=document.getElementById('f-title').value.trim(); if(!title){ document.getElementById('f-title').focus(); return; }
  const type=document.getElementById('f-type').value;
  const status=document.getElementById('f-status').value;
  const category=document.getElementById('f-cat').value;
  const notes=document.getElementById('f-notes').value.trim();
  const fav=document.getElementById('f-priority').value==='1';
  const newSeasons=type==='series'?getModalSeasons():[];
  const poster=tmdbSelected?.poster||(editId?items.find(i=>i.id===editId)?.poster:'')||'';
  const tmdbId=tmdbSelected?.tmdbId||(editId?items.find(i=>i.id===editId)?.tmdbId:null)||null;
  const year=tmdbSelected?.year||(editId?items.find(i=>i.id===editId)?.year:'')||'';
  const trailerId=tmdbSelected?.trailerId||(editId?items.find(i=>i.id===editId)?.trailerId:'')||'';

  if(editId){
    const it=items.find(i=>i.id===editId);
    const oldList=it.seasonList||[];
    it.seasonList=newSeasons.map((s,si)=>{ const old=oldList[si]||{}; return{eps:s.eps,doneEps:(old.doneEps||[]).filter(ep=>ep<=s.eps),history:old.history||[]}; });
    Object.assign(it,{title,type,status,category,notes,fav,poster,tmdbId,year,trailerId});
    toast('Título atualizado!');
  }else{
    // Check for duplicates
    const duplicate = items.find(i => i.title.toLowerCase().trim() === title.toLowerCase().trim());
    if(duplicate){
      if(!confirm(`"${title}" já existe na tua lista (${STATUS_LABEL[duplicate.status||'towatch']}). Queres adicionar mesmo assim?`)) return;
    }
    items.push({id:uid(),title,type,status,category,notes,fav,poster,tmdbId,year,trailerId,seasonList:newSeasons.map(s=>({eps:s.eps,doneEps:[],history:[]})),addedAt:Date.now()});

  }
  save(); closeModal(); render();
}

// ── TMDB Refresh All ──
async function tmdbRefreshAll(){
  const withTmdb = items.filter(i => i.tmdbId);
  if(!withTmdb.length){ toast('Nenhum título com dados TMDB para atualizar.'); return; }
  setSyncStatus('syncing');
  let updated = 0;
  for(const it of withTmdb){
    try{
      let changed = false;
      const mediaType = it.type==='series' ? 'tv' : 'movie';

      if(it.type==='series'){
        const res = await fetch(`https://api.themoviedb.org/3/tv/${it.tmdbId}?language=pt-PT`, {headers:{Authorization:`Bearer ${TMDB_TOKEN}`}});
        const data = await res.json();
        if(data.seasons){
          const newSeasons = data.seasons.filter(s => s.season_number > 0);
          newSeasons.forEach((s, si) => {
            if(!it.seasonList[si]){
              it.seasonList.push({eps: s.episode_count, doneEps:[], history:[]});
              changed = true;
            } else if(it.seasonList[si].eps !== s.episode_count){
              it.seasonList[si].eps = s.episode_count;
              it.seasonList[si].doneEps = it.seasonList[si].doneEps.filter(ep => ep <= s.episode_count);
              changed = true;
            }
          });
        }
        if(data.poster_path && !it.poster){
          it.poster = `https://image.tmdb.org/t/p/w500${data.poster_path}`;
          changed = true;
        }
      }

      // Always fetch trailer (force update)
      try{
        const vRes = await fetch(`https://api.themoviedb.org/3/${mediaType}/${it.tmdbId}/videos`, {headers:{Authorization:`Bearer ${TMDB_TOKEN}`}});
        const vData = await vRes.json();
        const results = vData.results || [];
        const t = results.find(v=>v.site==='YouTube' && v.type==='Trailer') ||
                  results.find(v=>v.site==='YouTube' && v.type==='Teaser') ||
                  results.find(v=>v.site==='YouTube');
        if(t && t.key !== it.trailerId){ it.trailerId = t.key; changed = true; }
      }catch(e){}

      if(changed) updated++;
    }catch(e){}
  }
  save(); render();
  toast(updated > 0 ? `${updated} título(s) atualizados!` : 'Tudo já está atualizado.');
}

function remove(id){
  const it = items.find(i => i.id === id);

  // Animate out
  const card = document.querySelector(`[data-id="${id}"]`);
  if(card){
    card.classList.add('removing');
    setTimeout(()=>{ items = items.filter(i => i.id !== id); delete openPanels[id]; save(); render(); }, 200);
  } else {
    items = items.filter(i => i.id !== id); delete openPanels[id]; save(); render();
  }
  toast('Removido.');
}
function toggleFav(id){ const it=items.find(i=>i.id===id); it.fav=!it.fav; save(); render(); }
function toggleEp(id,si,ep){
  const it=items.find(i=>i.id===id); const s=it.seasonList[si]; if(!s.history) s.history=[];
  const idx=s.doneEps.indexOf(ep);
  if(idx>-1){ s.doneEps.splice(idx,1); s.history=s.history.filter(h=>h.ep!==ep); }
  else{ s.doneEps.push(ep); s.history.push({ep,ts:Date.now()}); }
  save(); render();
}
function markAllEps(id,si,doMark){
  const it=items.find(i=>i.id===id); const s=it.seasonList[si]; if(!s.history) s.history=[];
  if(doMark){ const now=Date.now(); const existing=new Set(s.doneEps); s.doneEps=Array.from({length:s.eps},(_,i)=>i+1); for(let ep=1;ep<=s.eps;ep++) if(!existing.has(ep)) s.history.push({ep,ts:now}); }
  else{ s.doneEps=[]; s.history=[]; }
  save(); render();
}

  let visible=[...items].filter(i=>{
    if(typeFilter==='series'&&i.type!=='series') return false;
    if(typeFilter==='movie'&&i.type!=='movie') return false;
    if(typeFilter==='fav'&&!i.fav) return false;
    if(catFilter!==null&&i.category!==catFilter) return false;
    if(q&&!i.title.toLowerCase().includes(q)&&!(i.notes||'').toLowerCase().includes(q)) return false;
    return true;
  });
  if(sortVal==='name') visible.sort((a,b)=>a.title.localeCompare(b.title,'pt'));
  else if(sortVal==='name-desc') visible.sort((a,b)=>b.title.localeCompare(a.title,'pt'));
  else if(sortVal==='added') visible.sort((a,b)=>(b.addedAt||0)-(a.addedAt||0));
  else if(sortVal==='added-asc') visible.sort((a,b)=>(a.addedAt||0)-(b.addedAt||0));
  else if(sortVal==='progress') visible.sort((a,b)=>getProgress(b)-getProgress(a));
  else if(sortVal==='progress-asc') visible.sort((a,b)=>getProgress(a)-getProgress(b));

  const totalEpsAll=items.filter(i=>i.type==='series').reduce((a,it)=>(it.seasonList||[]).reduce((b,s)=>b+(s.doneEps||[]).length,a),0);

        const done=s.doneEps||[]; const allDone=s.eps>0&&done.length===s.eps; const isOpen=panels.has(si);
        const lastSeen=(s.history||[]).length?fmtDateShort([...s.history].sort((a,b)=>b.ts-a.ts)[0].ts):'';
        const epPills=Array.from({length:s.eps},(_,ei)=>{ const ep=ei+1,isDone=done.includes(ep); return `<span class="ep-pill${isDone?' done':''}" onclick="event.stopPropagation();toggleEp('${it.id}',${si},${ep})">Ep ${ep}</span>`; }).join('');
        return `<div class="season-block"><div class="season-header" onclick="togglePanel('${it.id}',${si})"><div class="season-header-left"><div class="season-check${allDone?' done':''}" onclick="event.stopPropagation();markAllEps('${it.id}',${si},${!allDone})"></div>T${si+1}</div><div class="season-header-right">${done.length}/${s.eps}${lastSeen?` · ${lastSeen}`:''}<i class="ti ti-chevron-down chevron${isOpen?' open':''}"></i></div></div><div class="season-eps${isOpen?' open':''}"><div class="ep-actions"><button class="ep-action-btn" onclick="markAllEps('${it.id}',${si},true)">Marcar todos</button><button class="ep-action-btn" onclick="markAllEps('${it.id}',${si},false)">Limpar</button><button class="ep-action-btn" style="margin-left:auto" onclick="openHistory('${it.id}')"><i class="ti ti-history" style="font-size:11px"></i> Histórico</button></div><div class="ep-grid">${epPills}</div></div></div>`;
      }).join('');
      seasonsHtml=`<div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div><div class="progress-label"><span>${doneEps}/${totalEps} eps</span><span>${pct}%</span></div>${blocks}`;
    }

    const posterHtml=it.poster
      ?`<img class="card-poster" src="${it.poster}" alt="${it.title}" loading="lazy" onclick="openDetail('${it.id}')" style="cursor:pointer"/>`
      :`<div class="card-poster-placeholder" onclick="openDetail('${it.id}')" style="cursor:pointer"><i class="ti ti-${it.type==='series'?'device-tv':'movie'}"></i></div>`;
    const catLabel=it.category?`<div class="card-cat"><i class="ti ti-folder" style="font-size:10px"></i>${it.category}</div>`:'';
    const notesHtml=it.notes?`<div class="card-notes">${it.notes.slice(0,80).replace(/</g,'&lt;')}${it.notes.length>80?'...':''}</div>`:'';
    const yearHtml=it.year?`<div class="card-year">${it.year}</div>`:'';

    return `<div class="card" data-id="${it.id}" draggable="true" ondragstart="onDragStart(event,'${it.id}')" ondragend="onDragEnd(event)" ondragover="onDragOver(event,'${it.id}')" ondrop="onDrop(event,'${it.id}')">
      <i class="ti ti-grip-vertical drag-handle"></i>
      ${posterHtml}
      <div class="card-body">
        <div class="card-top">
          <div class="card-top-left"><span class="badge ${badgeClass}">${badgeLabel}</span><span class="status-badge ${STATUS_CLASS[status]}">${STATUS_LABEL[status]}</span></div>
          <div class="card-actions">
            <button class="icon-btn${it.fav?' fav-on':''}" onclick="toggleFav('${it.id}')"><i class="ti ti-star${it.fav?'-filled':''}"></i></button>
            <button class="icon-btn" onclick="openModal('${it.id}')"><i class="ti ti-edit"></i></button>
            <button class="icon-btn" onclick="remove('${it.id}')"><i class="ti ti-trash"></i></button>
          </div>
        </div>
        <div class="card-title">${it.title}</div>
        ${yearHtml}${catLabel}
        ${it.type==='series'&&it.seasonList&&it.seasonList.length>0?`<div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div><div class="progress-label"><span>${it.seasonList.reduce((a,s)=>a+(s.doneEps||[]).length,0)}/${it.seasonList.reduce((a,s)=>a+s.eps,0)} eps</span><span>${pct}%</span></div>`:''}
      </div>
    </div>`;
  }).join('');
}

function clearAllData(){
  if(!confirm('Tens a certeza que queres apagar TODOS os filmes e séries?\n\nEsta ação não pode ser desfeita.')) return;
  if(!confirm('Última confirmação — apagar tudo?')) return;
  items = [];
  save(); render(); toast('Todos os dados foram apagados.');
}

loadTheme();
</script>
